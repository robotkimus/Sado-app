name: claude-trade-bot

on:
  # 실행은 cron-job.org가 매시간 정각에 workflow_dispatch로 트리거 (GitHub cron은 지연이 심해 사용 안 함)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude 모의투자 봇 실행
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 -u trade_bot.py
      - name: 봇 상태를 앱에 반영 (커밋)
        run: |
          git config user.name "claude-trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot_status.json equity_history.json trade_journal.json news.json runners.json
          git diff --staged --quiet && echo "변경 없음" && exit 0
          git commit -m "bot status update"
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push && break
            echo "retry $i"; sleep 3
          done

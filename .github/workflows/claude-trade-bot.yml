name: claude-trade-bot

on:
  schedule:
    # ── 미국 주식 정규장 (한국 평일 밤~새벽) ──
    - cron: "0 14 * * 1-5"   # 한국 23:00
    - cron: "0 17 * * 1-5"   # 한국 02:00
    - cron: "0 19 * * 1-5"   # 한국 04:00
    # ── 코인 전용 낮 시간대 (24시간 시장, 매일) ──
    - cron: "0 3 * * *"      # 한국 12:00 (정오)
    - cron: "0 9 * * *"      # 한국 18:00 (저녁)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Claude 모의투자 봇 실행
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 -u trade_bot.py
      - name: 봇 상태를 앱에 반영 (커밋)
        run: |
          git config user.name "claude-trade-bot"
          git config user.email "bot@users.noreply.github.com"
          git add bot_status.json
          git diff --staged --quiet || git commit -m "🤖 봇 포트폴리오 현황 업데이트"
          git push

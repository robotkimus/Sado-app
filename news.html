<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘, 사도 될까 — 뉴스</title>
<meta name="theme-color" content="#0E1320">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  :root{
    --bg:#0E1320; --card:#171E2E; --card2:#1D2638; --line:#26314A;
    --text:#EDEAE3; --dim:#8B94A8;
    --buy:#FF4D5E; --sell:#4D8CFF; --hold:#E8B454;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    padding:18px 14px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:480px; margin:0 auto;}
  .eyebrow{font-size:11px; letter-spacing:.22em; color:var(--dim); font-weight:700;}
  h1{font-size:26px; font-weight:800; margin:4px 0 14px; letter-spacing:-0.02em;}
  /* 탭 메뉴 */
  .tabs{display:flex; gap:6px; margin-bottom:16px; background:var(--card); padding:5px;
    border-radius:14px; border:1px solid var(--line);}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:10px; font-size:13px; font-weight:700;
    color:var(--dim); text-decoration:none; cursor:pointer;}
  .tab.on{background:var(--text); color:var(--bg);}
  /* 미국/국내 토글 */
  .toggle{display:flex; gap:8px; margin-bottom:12px;}
  .tg{flex:1; padding:10px 0; text-align:center; border-radius:12px; border:1px solid var(--line);
    background:transparent; color:var(--dim); font-size:13px; font-weight:700; cursor:pointer; font-family:inherit;}
  .tg.on{background:var(--card2); color:var(--text); border-color:var(--text);}
  .row{display:flex; gap:8px; margin-bottom:14px;}
  input[type=text]{flex:1; min-width:0; background:var(--card); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-size:14px; font-weight:700; padding:11px 14px; font-family:inherit;}
  input[type=text]::placeholder{color:var(--dim); font-weight:500;}
  .btn{padding:11px 18px; border-radius:12px; border:none; background:var(--text); color:var(--bg);
    font-weight:800; font-size:14px; cursor:pointer; font-family:inherit;}
  .btn:disabled{opacity:.5;}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:12px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{padding:8px 14px; border-radius:999px; border:1px solid var(--line); background:transparent;
    color:var(--dim); font-size:13px; font-weight:700; white-space:nowrap; cursor:pointer; font-family:inherit;}
  .chip.on{background:var(--text); color:var(--bg); border-color:var(--text);}
  .card{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:16px; margin-bottom:12px;}
  .sec-title{font-size:12.5px; font-weight:700; color:var(--dim); margin-bottom:8px;}
  .item{display:block; padding:11px 0; border-top:1px solid var(--line); text-decoration:none;
    color:var(--text); font-size:13.5px; line-height:1.45;}
  .item:first-child{border-top:none;}
  .item .meta{font-size:11.5px; color:var(--dim); margin-top:3px;}
  .muted{font-size:12px; color:var(--dim); line-height:1.6;}
  .switch{font-size:11px; color:var(--sell); text-decoration:none; font-weight:700;
    border:1px solid var(--line); padding:5px 10px; border-radius:99px;}
  .spin{display:inline-block; width:14px; height:14px; border:2px solid var(--bg);
    border-top-color:transparent; border-radius:99px; animation:sp .7s linear infinite; vertical-align:-2px;}
  @keyframes sp{to{transform:rotate(360deg)}}
  .dartrow{display:flex; gap:8px; margin-bottom:12px;}
  .dartrow input{font-size:12px; padding:9px 11px;}

  /* === 시장 지표 바 (공통) === */
  .mktbar{display:flex; align-items:center; gap:10px; width:100%;
    background:var(--card2); border:1px solid var(--line); border-radius:12px;
    padding:10px 13px; color:inherit; text-align:left; margin-bottom:12px; cursor:pointer;
    font-family:inherit;}
  .mktbar .mb-tabs{display:flex; gap:4px; flex-shrink:0;}
  .mktbar .mb-tab{font-size:11px; font-weight:700; color:var(--dim); padding:3px 8px;
    border-radius:7px; background:transparent; border:none; font-family:inherit; cursor:pointer;}
  .mktbar .mb-tab.on{background:var(--card); color:var(--text);}
  .mktbar .mb-roll{display:flex; align-items:baseline; gap:8px; flex:1; min-width:0;
    transition:opacity .22s ease, transform .22s ease; overflow:hidden;}
  .mb-roll .nm{font-size:12.5px; font-weight:700; color:var(--dim); white-space:nowrap;}
  .mb-roll .vl{font-size:15px; font-weight:800; white-space:nowrap;}
  .mb-roll .ar{font-size:12px; font-weight:700; white-space:nowrap;}
  .mktbar .mb-chev{color:var(--dim); font-size:16px; flex-shrink:0;}
  /* 상세 화면 (오버레이) */
  .mkt-detail{position:fixed; inset:0; background:var(--bg); z-index:90; overflow-y:auto;
    max-width:520px; margin:0 auto; display:none;}
  .mkt-detail.show{display:block;}
  .md-hd{display:flex; align-items:center; padding:18px 16px 12px; position:sticky; top:0;
    background:var(--bg); z-index:2;}
  .md-back{background:none; border:none; color:var(--text); font-size:26px; padding:0; line-height:1;
    font-family:inherit; cursor:pointer;}
  .md-title{flex:1; text-align:center; font-size:17px; font-weight:700; margin-right:26px;}
  .md-cats{display:flex; gap:20px; padding:0 18px; border-bottom:1px solid var(--line);
    position:sticky; top:50px; background:var(--bg); z-index:2; overflow-x:auto;}
  .md-cat{background:none; border:none; padding:9px 0 11px; font-size:15px; font-weight:600;
    color:var(--dim); border-bottom:2.5px solid transparent; white-space:nowrap; font-family:inherit; cursor:pointer;}
  .md-cat.on{font-weight:800; color:var(--text); border-bottom-color:var(--text);}
  .md-chips{display:flex; gap:8px; padding:13px 18px 4px;}
  .md-chip{padding:7px 16px; border-radius:999px; font-size:13px; font-weight:700; border:none;
    background:transparent; color:var(--dim); font-family:inherit; cursor:pointer;}
  .md-chip.on{background:var(--card2); color:var(--text);}
  .md-rows{padding:4px 18px 48px;}
  .md-row{display:flex; align-items:center; gap:13px; padding:16px 0; border-bottom:1px solid var(--line);}
  .md-row .mr-info{flex:1; min-width:0;}
  .md-row .mr-nm{font-size:16px; font-weight:800; color:var(--text);}
  .md-row .mr-sub{font-size:11.5px; color:var(--dim); margin-top:2px;}
  .md-row .mr-pr{display:flex; flex-direction:column; align-items:flex-end;}
  .md-row .mr-pc{font-size:16px; font-weight:800;}
  .md-row .mr-pv{font-size:12.5px; color:var(--dim); margin-top:2px;}
  .md-empty{color:var(--dim); font-size:14px; padding:40px 0; text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow" style="display:flex; justify-content:space-between; align-items:center;">
    <span>NEWS · DISCLOSURE</span>
  </div>
  <h1>오늘, 사도 될까</h1>

  <!-- 시장 지표 바 (공통) -->
  <button class="mktbar" id="mktInline" type="button">
    <span class="mb-tabs">
      <span class="mb-tab on" id="mktUS">미국</span>
      <span class="mb-tab" id="mktKR">국내</span>
    </span>
    <span class="mb-roll" id="mktRoll"><span class="nm">시장</span><span class="vl">불러오는 중…</span></span>
    <span class="mb-chev">›</span>
  </button>

  <!-- 탭 메뉴 -->
  <div class="tabs">
    <a class="tab" href="index.html">🇺🇸 해외</a>
    <a class="tab" href="kr.html">🇰🇷 국내</a>
    <a class="tab on">📰 뉴스</a>
  </div>

  <!-- 미국/국내 토글 -->
  <div class="toggle">
    <button class="tg on" id="tgUS">🇺🇸 미국</button>
    <button class="tg" id="tgKR">🇰🇷 국내</button>
  </div>

  <div class="chips" id="chips"></div>
  <div class="row">
    <input type="text" id="q" placeholder="종목명/티커 검색 (예: NVDA 또는 삼성전자)">
    <button class="btn" id="goBtn">검색</button>
  </div>

  <!-- Claude 시황 해설 -->
  <div class="card" id="summaryCard">
    <div class="sec-title">🧠 Claude 시황 해설</div>
    <div id="summaryAI" style="margin-top:4px;"></div>
    <div id="aiKeyRow" style="display:none; margin-top:10px;">
      <div class="muted" style="margin-bottom:8px;">
        Claude 해설을 보려면 <b style="color:var(--text)">Anthropic API 키</b>를 입력하세요. (console.anthropic.com에서 발급, sk-ant-로 시작)
      </div>
      <div class="row" style="margin-bottom:0;">
        <input type="text" id="anthropicKey" placeholder="sk-ant-... 붙여넣기" autocapitalize="off" autocorrect="off">
        <button class="btn" id="saveAnthropic">저장</button>
      </div>
    </div>
    <button class="btn" id="aiBtn" style="width:100%; margin-top:10px;">🧠 Claude 해설 보기</button>
  </div>

  <!-- 시장 지표 상세 화면 -->
  <div class="mkt-detail" id="mktDetail">
    <div class="md-hd">
      <button class="md-back" id="mdBack">‹</button>
      <div class="md-title">주요 지표</div>
    </div>
    <div class="md-cats" id="mdCats"></div>
    <div class="md-chips" id="mdChips"></div>
    <div class="md-rows" id="mdRows"></div>
  </div>

  <!-- DART 키 (국내일 때만 표시) -->
  <div class="dartrow" id="dartRow" style="display:none;">
    <input type="text" id="dartKey" placeholder="DART API 키 (공시 보려면 입력, opendart.fss.or.kr 무료)">
  </div>

  <div class="card" id="newsCard">
    <div class="sec-title" id="newsTitle">검색어를 입력하거나 종목을 선택하세요</div>
    <div id="newsList"><div class="muted">상단에서 미국/국내를 고르고, 종목을 검색해보세요.</div></div>
  </div>

  <div class="card" id="dartCard" style="display:none;">
    <div class="sec-title">📋 DART 공시</div>
    <div id="dartList"></div>
  </div>

  <div class="muted" style="margin-top:8px; font-size:11px; line-height:1.6;">
    뉴스는 구글뉴스 집계, 공시는 금융감독원 DART 기준이에요. 검증되지 않은 루머·찌라시는 포함하지 않아요.
    무료 데이터 특성상 가끔 느리거나 안 뜰 수 있어요.
  </div>
</div>

<script>
const US_PRESETS = ["NVDA","TSLA","AAPL","MSFT","AMZN","META"];
const KR_PRESETS = [
  {code:"005930", name:"삼성전자"},
  {code:"000660", name:"SK하이닉스"},
  {code:"373220", name:"LG엔솔"},
  {code:"035720", name:"카카오"},
  {code:"035420", name:"NAVER"},
  {code:"247540", name:"에코프로비엠"},
];
let market = "US";  // US | KR

function getDartKey(){ try{ return localStorage.getItem("dartKey")||""; }catch(e){ return window._dk||""; } }
function setDartKey(v){ try{ localStorage.setItem("dartKey", v); }catch(e){ window._dk = v; } }

function renderChips(){
  const el = document.getElementById("chips");
  el.innerHTML = "";
  if(market === "US"){
    US_PRESETS.forEach(t=>{
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = t;
      b.onclick = ()=>{ document.getElementById("q").value = t; search(); };
      el.appendChild(b);
    });
  } else {
    KR_PRESETS.forEach(k=>{
      const b = document.createElement("button");
      b.className = "chip"; b.textContent = k.name;
      b.onclick = ()=>{ document.getElementById("q").value = k.name; search(k.code); };
      el.appendChild(b);
    });
  }
}

function setMarket(m){
  market = m;
  document.getElementById("tgUS").className = "tg" + (m==="US"?" on":"");
  document.getElementById("tgKR").className = "tg" + (m==="KR"?" on":"");
  document.getElementById("dartRow").style.display = (m==="KR") ? "flex" : "none";
  document.getElementById("dartCard").style.display = "none";
  document.getElementById("q").placeholder = m==="US" ? "티커 검색 (예: NVDA)" : "종목명 검색 (예: 삼성전자)";
  renderChips();
}

function parseRss(xml){
  const doc = new DOMParser().parseFromString(xml, "text/xml");
  let items = [...doc.querySelectorAll("item")];
  if(!items.length) items = [...doc.getElementsByTagName("item")];
  return items;
}
async function fetchNews(query, lang){
  const hl = lang==="ko" ? "ko" : "en-US";
  const gl = lang==="ko" ? "KR" : "US";
  const ceid = lang==="ko" ? "KR:ko" : "US:en";
  const gUrl = `https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=${hl}&gl=${gl}&ceid=${ceid}`;
  const enc = encodeURIComponent(gUrl);

  // 1) allorigins get(JSON) — contents 필드에 본문 (가장 안정적)
  try{
    const res = await fetch(`https://api.allorigins.win/get?url=${enc}`, {signal:AbortSignal.timeout(14000)});
    if(res.ok){
      const j = await res.json();
      if(j && j.contents){
        const items = parseRss(j.contents);
        if(items.length) return items.slice(0,8);
      }
    }
  }catch(e){}

  // 2) raw 프록시들
  const proxies = [
    `https://corsproxy.io/?url=${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    `https://api.codetabs.com/v1/proxy/?quest=${enc}`,
    `https://thingproxy.freeboard.io/fetch/${gUrl}`,
    `https://r.jina.ai/${gUrl}`
  ];
  let lastErr = null;
  for(const u of proxies){
    try{
      const res = await fetch(u, {signal:AbortSignal.timeout(13000)});
      if(!res.ok) throw new Error("HTTP "+res.status);
      const xml = await res.text();
      const items = parseRss(xml);
      if(items.length) return items.slice(0,8);
      throw new Error("빈 결과");
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("모든 경로 실패");
}

async function loadDart(code){
  const listEl = document.getElementById("dartList");
  const card = document.getElementById("dartCard");
  const key = getDartKey();
  if(!key || key.length < 30){
    card.style.display = "block";
    listEl.innerHTML = '<div class="muted">💡 DART 키를 입력하면 이 종목의 공시를 볼 수 있어요. (opendart.fss.or.kr 무료 발급)</div>';
    return;
  }
  card.style.display = "block";
  listEl.innerHTML = '<div class="muted"><span class="spin"></span> 공시 불러오는 중...</div>';
  try{
    const today = new Date();
    const end = today.toISOString().slice(0,10).replace(/-/g,"");
    const past = new Date(today.getTime()-90*86400000).toISOString().slice(0,10).replace(/-/g,"");
    const dartUrl = `https://opendart.fss.or.kr/api/list.json?crtfc_key=${key}&bgn_de=${past}&end_de=${end}&page_count=100`;
    const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(dartUrl)}`, {signal:AbortSignal.timeout(13000)});
    const j = await res.json();
    if(j.status === "000" && j.list){
      const mine = j.list.filter(d=> d.stock_code === code).slice(0,8);
      if(mine.length){
        listEl.innerHTML = mine.map(d=>{
          const url = `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${d.rcept_no}`;
          return `<a class="item" href="${url}" target="_blank" rel="noopener">${d.report_nm}
            <div class="meta">${d.flr_nm} · ${d.rcept_dt}</div></a>`;
        }).join("");
      } else {
        listEl.innerHTML = '<div class="muted">최근 90일 내 이 종목 공시가 없어요.</div>';
      }
    } else {
      listEl.innerHTML = `<div class="muted">공시 조회 실패 (${j.message||j.status})</div>`;
    }
  }catch(e){
    listEl.innerHTML = '<div class="muted">공시를 불러오지 못했어요. 키를 확인하거나 잠시 후 다시 시도하세요.</div>';
  }
}

async function search(krCode){
  const q = document.getElementById("q").value.trim();
  if(!q){ return; }
  const btn = document.getElementById("goBtn");
  const listEl = document.getElementById("newsList");
  document.getElementById("newsTitle").textContent = `📰 "${q}" 관련 뉴스`;
  btn.disabled = true; const orig = btn.textContent; btn.innerHTML = '<span class="spin"></span>';
  listEl.innerHTML = '<div class="muted"><span class="spin"></span> 뉴스 불러오는 중...</div>';
  const query = market==="US" ? (q + " stock") : (q + " 주식");
  // 외부 검색 바로가기 링크 (프록시 실패해도 항상 작동)
  const gNews = market==="US"
    ? `https://news.google.com/search?q=${encodeURIComponent(query)}&hl=en-US`
    : `https://search.naver.com/search.naver?where=news&query=${encodeURIComponent(q)}&sort=1`;
  const linkBtn = `<a class="item" href="${gNews}" target="_blank" rel="noopener"
       style="text-align:center; font-weight:800; color:var(--sell); border-top:none;">
       🔗 ${market==="US"?"구글뉴스":"네이버뉴스"}에서 "${q}" 전체 보기 →</a>`;
  try{
    const items = await fetchNews(query, market==="US" ? "en" : "ko");
    const html = items.map(it=>{
      const title = it.querySelector("title")?.textContent || (it.getElementsByTagName("title")[0]?.textContent) || "";
      const link = it.querySelector("link")?.textContent || (it.getElementsByTagName("link")[0]?.textContent) || "#";
      const date = (it.querySelector("pubDate")?.textContent || "").slice(0,16);
      const src = it.querySelector("source")?.textContent || "";
      return `<a class="item" href="${link}" target="_blank" rel="noopener">${title}
        <div class="meta">${src}${src&&date?" · ":""}${date}</div></a>`;
    }).join("");
    listEl.innerHTML = html + linkBtn;
  }catch(e){
    // 헤드라인 못 불러오면 검색 링크만이라도 제공
    listEl.innerHTML = `<div class="muted" style="margin-bottom:8px;">
      앱 안에서 헤드라인을 불러오지 못했어요 (무료 프록시 제한). 아래 버튼으로 바로 볼 수 있어요.</div>` + linkBtn;
  }finally{
    btn.disabled = false; btn.textContent = orig;
  }
  // 국내면 공시도
  if(market === "KR"){
    let code = krCode;
    if(!code){
      const f = KR_PRESETS.find(k=>k.name===q || k.code===q);
      code = f ? f.code : (/^\d{6}$/.test(q) ? q : null);
    }
    if(code) loadDart(code);
    else { document.getElementById("dartCard").style.display = "none"; }
  } else {
    document.getElementById("dartCard").style.display = "none";
  }
}

/* 이벤트 */
document.getElementById("tgUS").onclick = ()=>setMarket("US");
document.getElementById("tgKR").onclick = ()=>setMarket("KR");
document.getElementById("goBtn").onclick = ()=>search();
document.getElementById("q").addEventListener("keydown", e=>{ if(e.key==="Enter") search(); });
const dk = document.getElementById("dartKey");
dk.value = getDartKey();
dk.addEventListener("change", ()=>setDartKey(dk.value.trim()));

/* ── 오늘의 시장 요약 ── */
function getAnthropicKey(){ try{ return localStorage.getItem("anthropic_key")||""; }catch(e){ return window._ak||""; } }
function setAnthropicKey(k){ try{ localStorage.setItem("anthropic_key", k); }catch(e){ window._ak = k; } }

/* ===== 시장 지표 바 (공통 모듈) ===== */
(function(){
  const MKT_ITEMS = [
    {sym:"%5EKS11",  name:"코스피",          cat:"지수·환율", region:"국내", dec:2},
    {sym:"%5EKQ11",  name:"코스닥",          cat:"지수·환율", region:"국내", dec:2},
    {sym:"%5EIXIC",  name:"나스닥",          cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5EGSPC",  name:"S&P 500",        cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5EDJI",   name:"다우존스",        cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5ERUT",   name:"러셀 2000",       cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5ESOX",   name:"필라델피아 반도체", cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5EVIX",   name:"VIX",            cat:"지수·환율", region:"해외", dec:2},
    {sym:"KRW=X",    name:"원/달러 환율",     cat:"지수·환율", region:"국내", dec:2},
    {sym:"DX-Y.NYB", name:"달러 인덱스",     cat:"지수·환율", region:"해외", dec:2},
    {sym:"%5EIRX",   name:"미국 국채 3개월",  cat:"채권", region:"해외", dec:3, suffix:"%"},
    {sym:"%5EFVX",   name:"미국 국채 5년",    cat:"채권", region:"해외", dec:3, suffix:"%"},
    {sym:"%5ETNX",   name:"미국 국채 10년",   cat:"채권", region:"해외", dec:3, suffix:"%"},
    {sym:"%5ETYX",   name:"미국 국채 30년",   cat:"채권", region:"해외", dec:3, suffix:"%"},
    {sym:"GC=F",     name:"금",             cat:"원자재", region:"해외", dec:1},
    {sym:"SI=F",     name:"은",             cat:"원자재", region:"해외", dec:2},
    {sym:"HG=F",     name:"구리",           cat:"원자재", region:"해외", dec:3},
    {sym:"CL=F",     name:"WTI 유가",        cat:"원자재", region:"해외", dec:2},
    {sym:"NG=F",     name:"천연가스",        cat:"원자재", region:"해외", dec:3},
    {sym:"BTC-USD",  name:"비트코인",        cat:"가상자산", region:"해외", dec:0, prefix:"$"},
    {sym:"ETH-USD",  name:"이더리움",        cat:"가상자산", region:"해외", dec:0, prefix:"$"},
    {sym:"XRP-USD",  name:"리플",           cat:"가상자산", region:"해외", dec:3, prefix:"$"},
    {sym:"SOL-USD",  name:"솔라나",          cat:"가상자산", region:"해외", dec:2, prefix:"$"},
  ];
  const MKT_CATS = ["지수·환율","채권","원자재","가상자산"];
  const CAT_SUB = {"지수·환율":"지수","채권":"채권금리","원자재":"원자재","가상자산":"가상자산"};
  let mktData = [];
  let mktTab = "해외", rollIdx = 0, rollTimer = null;
  let detailCat = "지수·환율", detailFilter = "전체";

  function mbFetch(url){
    const enc = encodeURIComponent(url);
    const proxies = [url, "https://corsproxy.io/?url="+enc, "https://api.allorigins.win/raw?url="+enc];
    return (async ()=>{
      for(const u of proxies){
        try{ const r = await fetch(u, {signal:AbortSignal.timeout(8000)}); if(r.ok) return await r.json(); }catch(e){}
      }
      return null;
    })();
  }
  function fmtVal(it){
    const num = it.v.toLocaleString(undefined,{minimumFractionDigits:it.dec, maximumFractionDigits:it.dec});
    return (it.prefix||"") + num + (it.suffix||"");
  }
  const col = up => up ? "var(--buy)" : "var(--sell)";

  async function loadMkt(){
    await Promise.all(MKT_ITEMS.map(async it=>{
      const j = await mbFetch("https://query1.finance.yahoo.com/v8/finance/chart/"+it.sym+"?range=5d&interval=1d");
      const m = j && j.chart && j.chart.result && j.chart.result[0] && j.chart.result[0].meta;
      if(m && isFinite(m.regularMarketPrice)){
        const now = m.regularMarketPrice, prev = (m.chartPreviousClose!=null?m.chartPreviousClose:now);
        it.v = now; it.pc = prev ? ((now/prev)-1)*100 : 0; it.diff = now-prev; it.up = (now-prev)>=0;
        mktData.push(it);
      }
    }));
    // 전역으로 노출 (Claude 해설용)
    window.mktData = mktData;
    renderRoll();
  }

  function rollList(){ return mktData.filter(d=>d.cat==="지수·환율" && d.region===mktTab); }
  function rollHTML(it){
    return '<span class="nm">'+it.name+'</span><span class="vl">'+fmtVal(it)+'</span>'
      +'<span class="ar" style="color:'+col(it.up)+'">'+(it.up?"▲":"▼")+' '+(it.up?"+":"")+it.pc.toFixed(2)+'%</span>';
  }
  function renderRoll(){
    const roll = document.getElementById("mktRoll");
    const list = rollList();
    if(!roll) return;
    if(!list.length){ roll.innerHTML = '<span class="nm">시장</span><span class="vl" style="color:var(--dim)">데이터 없음</span>'; return; }
    rollIdx = rollIdx % list.length;
    roll.innerHTML = rollHTML(list[rollIdx]);
    clearInterval(rollTimer);
    rollTimer = setInterval(()=>{
      const r = document.getElementById("mktRoll"), l = rollList();
      if(!r || !l.length){ clearInterval(rollTimer); return; }
      r.style.opacity="0"; r.style.transform="translateY(-5px)";
      setTimeout(()=>{ rollIdx=(rollIdx+1)%l.length; r.innerHTML=rollHTML(l[rollIdx]);
        r.style.opacity="1"; r.style.transform="translateY(0)"; },220);
    },3000);
  }

  function renderDetail(){
    const items = mktData.filter(d=>d.cat===detailCat && (detailFilter==="전체"||d.region===detailFilter));
    document.getElementById("mdCats").innerHTML =
      MKT_CATS.map(c=>'<button class="md-cat '+(c===detailCat?"on":"")+'" data-cat="'+c+'">'+c+'</button>').join("");
    document.getElementById("mdChips").innerHTML =
      ["전체","국내","해외"].map(f=>'<button class="md-chip '+(f===detailFilter?"on":"")+'" data-f="'+f+'">'+f+'</button>').join("");
    let rows = "";
    if(!items.length) rows = '<div class="md-empty">해당 지표가 없어요. (무료로 못 받는 항목일 수 있어요)</div>';
    items.forEach(it=>{
      const c = col(it.up);
      const chg = it.cat==="채권" ? (it.up?"+":"")+it.diff.toFixed(3) : (it.up?"+":"")+it.pc.toFixed(2)+"%";
      rows += '<div class="md-row"><div class="mr-info"><div class="mr-nm">'+it.name+'</div>'
        +'<div class="mr-sub">'+(CAT_SUB[it.cat]||"")+' · '+(it.region)+'</div></div>'
        +'<div class="mr-pr"><span class="mr-pc" style="color:'+c+'">'+chg+'</span>'
        +'<span class="mr-pv">'+fmtVal(it)+'</span></div></div>';
    });
    document.getElementById("mdRows").innerHTML = rows;
    document.querySelectorAll(".md-cat").forEach(b=>b.onclick=()=>{ detailCat=b.dataset.cat; detailFilter="전체"; renderDetail(); });
    document.querySelectorAll(".md-chip").forEach(b=>b.onclick=()=>{ detailFilter=b.dataset.f; renderDetail(); });
  }

  document.getElementById("mktUS").onclick = (e)=>{ e.stopPropagation(); mktTab="해외"; rollIdx=0;
    document.getElementById("mktUS").classList.add("on"); document.getElementById("mktKR").classList.remove("on"); renderRoll(); };
  document.getElementById("mktKR").onclick = (e)=>{ e.stopPropagation(); mktTab="국내"; rollIdx=0;
    document.getElementById("mktKR").classList.add("on"); document.getElementById("mktUS").classList.remove("on"); renderRoll(); };
  document.getElementById("mktInline").onclick = ()=>{
    detailCat="지수·환율"; detailFilter="전체"; renderDetail();
    document.getElementById("mktDetail").classList.add("show"); window.scrollTo(0,0);
  };
  document.getElementById("mdBack").onclick = ()=>document.getElementById("mktDetail").classList.remove("show");

  loadMkt();
})();


async function generateAICommentary(){
  const aiBox = document.getElementById("summaryAI");
  const key = getAnthropicKey();
  if(!key){
    document.getElementById("aiKeyRow").style.display = "block";
    return;
  }
  const md = window.mktData || [];
  if(!md.length){ aiBox.innerHTML = '<div class="muted">시장 데이터를 아직 못 불러왔어요. 잠시 후 다시 시도해주세요.</div>'; return; }
  aiBox.innerHTML = '<div class="muted"><span class="spin"></span> 뉴스 수집 + Claude 해설 작성 중...</div>';

  // 데이터를 텍스트로 정리 (Claude에게 진짜 숫자만 전달)
  const pick = (n)=> md.find(x=>x.name===n);
  const d = {
    sp:pick("S&P 500"), dow:pick("다우존스"), nq:pick("나스닥"), rut:pick("러셀 2000"),
    tnx:pick("미국 국채 10년"), dxy:pick("달러 인덱스"), gold:pick("금"), wti:pick("WTI 유가"),
    vix:pick("VIX"), kospi:pick("코스피"),
  };
  const fmt = (r)=> r ? `${r.name} ${r.v.toLocaleString(undefined,{maximumFractionDigits:r.dec})}${r.suffix||""} (${r.pc>=0?"+":""}${r.pc.toFixed(2)}%)` : "";
  const dataText = ["sp","dow","nq","rut","tnx","dxy","gold","wti","vix","kospi"].map(k=>fmt(d[k])).filter(Boolean).join("\n");

  // 거시경제 뉴스 헤드라인 수집 (여러 키워드, 되는 만큼만)
  let headlines = [];
  const queries = ["US stock market", "Federal Reserve FOMC", "US economy inflation"];
  await Promise.all(queries.map(async q=>{
    try{
      const items = await fetchNews(q, "en");
      if(items && items.length) headlines.push(...items.slice(0,4).map(it=>it.title));
    }catch(e){}
  }));
  // 중복 제거 + 최대 12개
  headlines = [...new Set(headlines)].slice(0,12);

  let newsBlock = "";
  if(headlines.length){
    newsBlock = `\n[오늘 수집된 뉴스 헤드라인 (참고용)]\n` + headlines.map((h,i)=>`${i+1}. ${h}`).join("\n");
  }

  const prompt = `당신은 한국어 금융 시황 해설가입니다. 아래는 오늘 미국 시장의 실제 데이터와, 수집된 뉴스 헤드라인입니다. 이를 종합해 차분하고 객관적인 시황 해설을 작성하세요.

[실제 시장 데이터]
${dataText}
${newsBlock}

규칙:
- 시장 데이터의 숫자는 정확히 그대로 인용하세요. 데이터에 없는 수치를 지어내지 마세요.
- 뉴스 헤드라인은 "참고용"입니다. 헤드라인에서 읽을 수 있는 사실만 언급하고, 헤드라인에 없는 내용(구체적 발언, 수치, 사건)을 추측하거나 지어내지 마세요. 헤드라인이 모호하면 무리해서 해석하지 마세요.
- 지수·금리·달러·원자재 방향을 종합해 위험선호/위험회피, 금리·달러 부담 등을 해설하고, 뉴스 맥락이 있으면 자연스럽게 엮으세요.
- 6~9문장. 마지막에 한 줄로 전체 분위기를 요약하세요.
- 투자 권유나 매수/매도 단정은 하지 마세요.
- 존댓말로 작성하세요.`;

  try{
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":key,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body: JSON.stringify({
        model:"claude-sonnet-4-6",
        max_tokens:900,
        messages:[{role:"user", content:prompt}]
      }),
      signal:AbortSignal.timeout(40000)
    });
    if(res.status === 401){
      document.getElementById("aiKeyRow").style.display = "block";
      aiBox.innerHTML = '<div class="err" style="color:var(--buy);">API 키가 올바르지 않아요. 다시 확인해주세요.</div>';
      return;
    }
    if(!res.ok){
      aiBox.innerHTML = `<div class="muted">해설 생성 실패 (${res.status}). 잠시 후 다시 시도해주세요.</div>`;
      return;
    }
    const j = await res.json();
    const text = (j.content||[]).map(c=>c.text||"").join("\n").trim();
    const now = new Date();
    const newsNote = headlines.length
      ? `뉴스 헤드라인 ${headlines.length}건 + 실제 데이터 기반`
      : `실제 데이터 기반 (뉴스 헤드라인 수집 실패 — 데이터만 해설)`;
    aiBox.innerHTML = `<div style="padding:14px; background:var(--card2); border:1px solid var(--line); border-radius:14px;">
      <div style="font-size:12px; font-weight:700; color:var(--dim); margin-bottom:8px;">🧠 Claude의 시황 해설</div>
      <div style="font-size:13px; line-height:1.75; white-space:pre-wrap;">${text.replace(/</g,"&lt;")}</div>
      <div style="font-size:10px; color:var(--dim); margin-top:10px; line-height:1.5;">
        ${now.getMonth()+1}월 ${now.getDate()}일 ${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")} 생성 · ${newsNote} · 투자 권유가 아니에요.</div>
    </div>`;
  }catch(e){
    aiBox.innerHTML = '<div class="muted">해설 생성 중 오류가 났어요. 네트워크를 확인하고 다시 시도해주세요.</div>';
  }
}

document.getElementById("aiBtn").onclick = generateAICommentary;
(function(){
  const sb = document.getElementById("saveAnthropic");
  const inp = document.getElementById("anthropicKey");
  if(sb && inp){
    inp.value = getAnthropicKey();
    sb.onclick = ()=>{
      const k = inp.value.trim();
      if(!k) return;
      setAnthropicKey(k);
      document.getElementById("aiKeyRow").style.display = "none";
      generateAICommentary();
    };
  }
})();

/* 초기화 */
setMarket("US");

</script>

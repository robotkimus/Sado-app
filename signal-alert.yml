name: signal-alert

on:
  schedule:
    # 미국 장 마감 후 (한국시간 새벽 6시 = UTC 21시)
    - cron: '0 21 * * 1-5'
    # 한국 장 마감 후 (한국시간 오후 4시 = UTC 7시)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:   # 수동 실행 가능

permissions:
  contents: write

jobs:
  alert:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 신호 변화 체크 + 알림
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python signal_alert.py

      - name: 상태 저장 (signal_state.json 커밋)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add signal_state.json || true
          git diff --staged --quiet || git commit -m "신호 상태 업데이트 [skip ci]"
          for i in 1 2 3; do
            git pull --rebase --autostash && git push && break || sleep 5
          done

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘, 사도 될까 — 국내</title>
<meta name="theme-color" content="#0E1320">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#0E1320; --card:#171E2E; --card2:#1D2638; --line:#26314A;
    --text:#EDEAE3; --dim:#8B94A8;
    --buy:#FF4D5E; --sell:#4D8CFF; --hold:#E8B454;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    padding:18px 14px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:480px; margin:0 auto;}
  .eyebrow{font-size:11px; letter-spacing:.22em; color:var(--dim); font-weight:700;}
  h1{font-size:26px; font-weight:800; margin:4px 0 16px; letter-spacing:-0.02em;}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    padding:8px 14px; border-radius:999px; border:1px solid var(--line);
    background:transparent; color:var(--dim); font-size:13px; font-weight:700;
    white-space:nowrap; cursor:pointer; font-family:inherit;
  }
  .chip.on{background:var(--text); color:var(--bg); border-color:var(--text);}
  .row{display:flex; gap:8px; margin-bottom:14px;}
  input[type=text]{
    flex:1; min-width:0; background:var(--card); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-size:14px; font-weight:700; padding:11px 14px; font-family:inherit;
  }
  input[type=text]::placeholder{color:var(--dim); font-weight:500;}
  .btn{
    padding:11px 18px; border-radius:12px; border:none; background:var(--text); color:var(--bg);
    font-weight:800; font-size:14px; cursor:pointer; font-family:inherit;
  }
  .btn:disabled{opacity:.5;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    margin-bottom:12px; overflow:hidden;
  }
  #chartbox{height:300px; position:relative;}
  #chartbox canvas{width:100%; height:100%; display:block;}
  .pad{padding:16px;}
  .sec-title{font-size:12.5px; font-weight:700; color:var(--dim); margin-bottom:10px;}
  .verdict-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .price{font-size:30px; font-weight:800; font-variant-numeric:tabular-nums;}
  .chg{font-size:14px; font-weight:700; margin-left:8px;}
  .glyph{font-size:30px; line-height:1; text-align:center;}
  .vlabel{font-size:14px; font-weight:800; margin-top:4px; text-align:center;}
  .vscore{font-size:11px; color:var(--dim); margin-top:2px; text-align:center; font-variant-numeric:tabular-nums;}
  .gauge{position:relative; height:8px; border-radius:99px; margin-top:16px;
    background:linear-gradient(90deg,var(--sell),var(--hold) 50%,var(--buy)); opacity:.92;}
  .knob{position:absolute; top:-4px; width:16px; height:16px; border-radius:99px;
    background:var(--text); border:3px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,.5);}
  .gauge-labels{display:flex; justify-content:space-between; font-size:10.5px; color:var(--dim); margin-top:6px;}
  .sig{display:flex; gap:12px; align-items:flex-start; padding:13px 14px;
    background:var(--card2); border:1px solid var(--line); border-radius:14px; margin-bottom:8px;}
  .tag{min-width:64px; text-align:center; padding:5px 0; border-radius:8px; font-size:12px; font-weight:800;}
  .t-buy{background:rgba(255,77,94,.15); color:var(--buy);}
  .t-sell{background:rgba(77,140,255,.15); color:var(--sell);}
  .t-hold{background:rgba(232,180,84,.15); color:var(--hold);}
  .sig-name{font-size:13.5px; font-weight:700; margin-bottom:3px;}
  .sig-detail{font-size:12.5px; color:var(--dim); line-height:1.5;}
  .note{font-size:11px; color:var(--dim); line-height:1.65; margin-top:16px;}
  .err{font-size:12.5px; color:var(--buy); margin:8px 0; line-height:1.5;}
  .muted{font-size:11.5px; color:var(--dim); line-height:1.55;}
  .switch{font-size:11px; color:var(--sell); text-decoration:none; font-weight:700;
    border:1px solid var(--line); padding:5px 10px; border-radius:99px; letter-spacing:0;}
  .naver{display:inline-block; margin-top:8px; color:var(--sell); font-size:12px; font-weight:700; text-decoration:none;}
  .spin{display:inline-block; width:14px; height:14px; border:2px solid var(--bg);
    border-top-color:transparent; border-radius:99px; animation:sp .7s linear infinite; vertical-align:-2px;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow" style="display:flex; justify-content:space-between; align-items:center;">
    <span>KR STOCK · SIGNAL</span>
    <a class="switch" href="index.html">🇺🇸 해외주식 →</a>
  </div>
  <h1>오늘, 사도 될까</h1>

  <div class="chips" id="chips"></div>
  <div class="row">
    <input type="text" id="codeInput" placeholder="종목코드 6자리 (예: 005930)" maxlength="6" inputmode="numeric">
    <button class="btn" id="goBtn">보기</button>
  </div>

  <div class="card"><div id="chartbox"><canvas id="chart"></canvas></div></div>

  <div class="card pad">
    <div class="sec-title" id="sigTitle">종목을 선택하거나 코드를 입력하세요</div>
    <button class="btn" id="analyzeBtn" style="width:100%; padding:14px;">실시간 데이터로 신호 분석</button>
    <div id="err" class="err"></div>
    <a id="naverLink" class="naver" href="#" target="_blank" rel="noopener" style="display:none;">📊 네이버 금융에서 자세히 보기 →</a>
  </div>

  <div class="card pad" id="result" style="display:none;">
    <div class="verdict-top">
      <div>
        <div class="muted" id="vTicker"></div>
        <div><span class="price" id="vPrice"></span><span class="chg" id="vChg"></span></div>
        <div class="muted" id="vDate" style="margin-top:2px;"></div>
      </div>
      <div>
        <div class="glyph" id="vGlyph"></div>
        <div class="vlabel" id="vLabel"></div>
        <div class="vscore" id="vScore"></div>
      </div>
    </div>
    <div class="gauge"><div class="knob" id="knob"></div></div>
    <div class="gauge-labels"><span>매도</span><span>관망</span><span>매수</span></div>
    <div id="sigList" style="margin-top:16px;"></div>
    <div class="note">
      신호 판정은 일별 종가 기준의 기계적 해석일 뿐 투자 권유가 아니며, 미래 수익을 보장하지 않아요.
      매매 전 기업 실적과 시장 환경도 함께 확인하세요. · 데이터: Yahoo Finance
    </div>
  </div>
</div>

<script>
const KR_PRESETS = [
  {code:"005930", name:"삼성전자"},
  {code:"000660", name:"SK하이닉스"},
  {code:"373220", name:"LG엔솔"},
  {code:"035720", name:"카카오"},
  {code:"035420", name:"NAVER"},
  {code:"247540", name:"에코프로비엠"},
  {code:"005380", name:"현대차"},
  {code:"068270", name:"셀트리온"},
];
let current = "005930";
let lastRows = null;
const chipsEl = document.getElementById("chips");
function krName(code){ const f = KR_PRESETS.find(k=>k.code===code); return f ? f.name : code; }
function renderChips(){
  chipsEl.innerHTML = "";
  KR_PRESETS.forEach(k=>{
    const b = document.createElement("button");
    b.className = "chip" + (k.code===current ? " on" : "");
    b.textContent = k.name;
    b.onclick = ()=>{ setCode(k.code); analyze(); };
    chipsEl.appendChild(b);
  });
}
function setCode(code){
  current = code.trim();
  renderChips();
  document.getElementById("sigTitle").textContent = `${krName(current)} (${current}) 신호 판정`;
  document.getElementById("result").style.display = "none";
  document.getElementById("err").innerHTML = "";
  const nl = document.getElementById("naverLink");
  nl.href = `https://finance.naver.com/item/main.naver?code=${current}`;
  nl.style.display = "inline-block";
}

async function yahooFetch(ysym){
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?range=1y&interval=1d`;
  const tries = [
    base,
    `https://corsproxy.io/?url=${encodeURIComponent(base)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`,
    `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(base)}`
  ];
  let lastErr = null;
  for(const url of tries){
    try{
      const res = await fetch(url, {signal: AbortSignal.timeout(13000)});
      if(!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const r = json?.chart?.result?.[0];
      if(!r) throw new Error("형식 오류");
      const ts = r.timestamp || [];
      const q = r.indicators?.quote?.[0] || {};
      const closes = q.close || [], vols = q.volume || [];
      const out = [];
      for(let i=0;i<ts.length;i++){
        const c = closes[i];
        if(c==null || !isFinite(c)) continue;
        const d = new Date(ts[i]*1000);
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        out.push({date:ds, close:c, volume:(vols[i]||0)});
      }
      if(out.length >= 25) return out.slice(-160);
      throw new Error("데이터 부족");
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("불러오기 실패");
}
async function fetchDailyKR(code){
  try{ return await yahooFetch(code + ".KS"); }
  catch(e1){
    try{ return await yahooFetch(code + ".KQ"); }
    catch(e2){ throw new Error("국내 시세 불러오기 실패. 잠시 후 다시 시도하거나, 종목코드(6자리)를 확인해주세요."); }
  }
}

function sma(arr,n,i){ if(i<n-1) return null; let s=0; for(let k=i-n+1;k<=i;k++) s+=arr[k]; return s/n; }
function compute(series){
  const closes = series.map(r=>r.close), vols = series.map(r=>r.volume);
  const rows = series.map((r,i)=>{
    const ma5=sma(closes,5,i), ma20=sma(closes,20,i);
    let upper=null, lower=null;
    if(i>=19){
      let sq=0; for(let k=i-19;k<=i;k++) sq += (closes[k]-ma20)**2;
      const sd=Math.sqrt(sq/20); upper=ma20+2*sd; lower=ma20-2*sd;
    }
    return {...r, ma5, ma20, upper, lower, volAvg20:sma(vols,20,i)};
  });
  let g=0,l=0;
  for(let i=1;i<rows.length;i++){
    const ch=closes[i]-closes[i-1], gain=Math.max(ch,0), loss=Math.max(-ch,0);
    if(i<=14){ g+=gain/14; l+=loss/14; rows[i].rsi = i===14 ? 100-100/(1+(l===0?100:g/l)) : null; }
    else{ g=(g*13+gain)/14; l=(l*13+loss)/14; rows[i].rsi = 100-100/(1+(l===0?100:g/l)); }
  }
  return rows;
}
function judge(rows){
  const last = rows[rows.length-1];
  const sigs = [];
  if(last.ma20!=null){
    const above = last.close > last.ma20;
    const gap = ((last.close-last.ma20)/last.ma20)*100;
    sigs.push({name:"20일 이동평균선", v:above?"buy":"sell", s:above?1:-1,
      d: above ? `주가가 20일선보다 ${gap.toFixed(1)}% 위 — 단기 추세 양호`
               : `주가가 20일선보다 ${Math.abs(gap).toFixed(1)}% 아래 — 추세 이탈 주의`});
  }
  let cross=null;
  for(let i=rows.length-7;i<rows.length;i++){
    const p=rows[i-1], c=rows[i];
    if(!p?.ma5||!p?.ma20||!c?.ma5||!c?.ma20) continue;
    if(p.ma5<=p.ma20 && c.ma5>c.ma20) cross={t:"g", date:c.date};
    if(p.ma5>=p.ma20 && c.ma5<c.ma20) cross={t:"d", date:c.date};
  }
  sigs.push({name:"골든 / 데드크로스", v:cross?(cross.t==="g"?"buy":"sell"):"hold", s:cross?(cross.t==="g"?1.5:-1.5):0,
    d: cross ? `${cross.date} ${cross.t==="g"?"골든크로스 발생 — 강한 매수 신호":"데드크로스 발생 — 매도 신호"}`
             : "최근 7거래일 내 교차 없음 — 추세 유지 중"});
  if(last.rsi!=null){
    const r=last.rsi;
    sigs.push({name:"RSI (14)", v:r<=30?"buy":r>=70?"sell":"hold", s:r<=30?1:r>=70?-1:0,
      d: r<=30 ? `RSI ${r.toFixed(0)} — 과매도 구간, 반등 노릴 자리`
        : r>=70 ? `RSI ${r.toFixed(0)} — 과열 구간, 매도 준비`
        : `RSI ${r.toFixed(0)} — 중립 구간 (30~70)`});
  }
  if(last.upper!=null){
    const pos=(last.close-last.lower)/(last.upper-last.lower);
    sigs.push({name:"볼린저 밴드", v:pos<=0.15?"buy":pos>=0.85?"sell":"hold", s:pos<=0.15?1:pos>=0.85?-1:0,
      d: pos<=0.15 ? "밴드 하단 근접 — 통계적 저점 영역"
        : pos>=0.85 ? "밴드 상단 근접 — 통계적 고점 영역"
        : `밴드 내 ${(pos*100).toFixed(0)}% 위치 — 중간 영역`});
  }
  if(last.volAvg20!=null && last.volAvg20>0){
    const ratio=last.volume/last.volAvg20;
    const prev=rows[rows.length-2];
    const up = prev ? last.close>=prev.close : true;
    const ok = ratio>=1.2;
    sigs.push({name:"거래량 확인", v:ok?(up?"buy":"sell"):"hold", s:ok?(up?0.5:-0.5):0,
      d: ok ? `평균 대비 ${(ratio*100).toFixed(0)}% 거래량 — ${up?"상승에 힘이 실림":"하락에 매물 출회 — 경계"}`
            : `평균 대비 ${(ratio*100).toFixed(0)}% — 거래량 평이`});
  }
  const total = sigs.reduce((a,x)=>a+x.s,0);
  const overall = total>=1.5?"buy":total<=-1.5?"sell":"hold";
  return {sigs, total, overall, last, prev:rows[rows.length-2], rows};
}

function drawChart(rows){
  const cv = document.getElementById("chart");
  const box = document.getElementById("chartbox");
  const dpr = window.devicePixelRatio || 1;
  const W = box.clientWidth, H = box.clientHeight;
  if(!W || !H) return;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const data = rows.slice(-90);
  const pad = {l:8, r:60, t:16, b:8};
  const xs = (i)=> pad.l + (W-pad.l-pad.r) * (i/(data.length-1));
  let min=Infinity, max=-Infinity;
  data.forEach(r=>{ min=Math.min(min,r.close); max=Math.max(max,r.close);
    if(r.ma20!=null){min=Math.min(min,r.ma20);max=Math.max(max,r.ma20);} });
  const sp=(max-min)||1; min-=sp*0.08; max+=sp*0.08;
  const ys=(v)=> pad.t + (H-pad.t-pad.b) * (1-(v-min)/(max-min));
  ctx.strokeStyle="#26314A"; ctx.fillStyle="#8B94A8"; ctx.font="10px sans-serif"; ctx.textAlign="left";
  for(let g=0; g<=3; g++){
    const v=min+(max-min)*g/3, y=ys(v);
    ctx.globalAlpha=.35; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.globalAlpha=1; ctx.fillText("₩"+Math.round(v).toLocaleString(), W-pad.r+5, y+3);
  }
  const line=(key,color,w)=>{
    ctx.strokeStyle=color; ctx.lineWidth=w; ctx.beginPath(); let st=false;
    data.forEach((r,i)=>{ const v=key==="close"?r.close:r[key]; if(v==null) return;
      const x=xs(i), y=ys(v); if(!st){ctx.moveTo(x,y);st=true;} else ctx.lineTo(x,y); });
    ctx.stroke();
  };
  line("ma20","#4D8CFF",1.2);
  line("ma5","#E8B454",1.2);
  const upTrend = data[data.length-1].close >= data[0].close;
  line("close", upTrend ? "#FF4D5E" : "#4D8CFF", 1.8);
  ctx.textAlign="left"; ctx.font="10px sans-serif";
  ctx.fillStyle="#FF4D5E"; ctx.fillText("● 종가", pad.l, 11);
  ctx.fillStyle="#E8B454"; ctx.fillText("● 5일", pad.l+44, 11);
  ctx.fillStyle="#4D8CFF"; ctx.fillText("● 20일", pad.l+82, 11);
}

const V = {
  buy:  {g:"🔴", label:"매수 우위", color:"var(--buy)"},
  sell: {g:"🔵", label:"매도 우위", color:"var(--sell)"},
  hold: {g:"🟡", label:"관망", color:"var(--hold)"},
};
function render(res){
  const v = V[res.overall];
  document.getElementById("result").style.display = "block";
  document.getElementById("vTicker").textContent = `${krName(current)} (${current})`;
  document.getElementById("vPrice").textContent = "₩" + Math.round(res.last.close).toLocaleString();
  const chg = res.prev ? ((res.last.close-res.prev.close)/res.prev.close)*100 : 0;
  const chgEl = document.getElementById("vChg");
  chgEl.textContent = (chg>=0?"+":"") + chg.toFixed(2) + "%";
  chgEl.style.color = chg>=0 ? "var(--buy)" : "var(--sell)";
  document.getElementById("vDate").textContent = res.last.date + " 종가 기준";
  document.getElementById("vGlyph").textContent = v.g;
  document.getElementById("vLabel").textContent = v.label;
  document.getElementById("vLabel").style.color = v.color;
  document.getElementById("vScore").textContent = `종합 ${res.total>=0?"+":""}${res.total.toFixed(1)}`;
  const pct = Math.max(0, Math.min(100, (res.total+5)/10*100));
  document.getElementById("knob").style.left = `calc(${pct}% - 8px)`;
  const list = document.getElementById("sigList");
  list.innerHTML = "";
  res.sigs.forEach(s=>{
    const tagCls = s.v==="buy"?"t-buy":s.v==="sell"?"t-sell":"t-hold";
    const tagTxt = s.v==="buy"?"매수":s.v==="sell"?"매도":"관망";
    const el = document.createElement("div");
    el.className = "sig";
    el.innerHTML = `<span class="tag ${tagCls}">${tagTxt}</span>
      <div><div class="sig-name">${s.name}</div><div class="sig-detail">${s.d}</div></div>`;
    list.appendChild(el);
  });
  lastRows = res.rows;
  drawChart(res.rows);
}

async function analyze(){
  const btn = document.getElementById("analyzeBtn");
  const errEl = document.getElementById("err");
  errEl.innerHTML = "";
  btn.disabled = true;
  const orig = btn.textContent;
  btn.innerHTML = '<span class="spin"></span> 분석 중...';
  try{
    const series = await fetchDailyKR(current);
    render(judge(compute(series)));
  }catch(e){
    errEl.textContent = e.message || "분석에 실패했어요.";
    document.getElementById("result").style.display = "none";
  }finally{
    btn.disabled = false;
    btn.textContent = orig;
  }
}

document.getElementById("goBtn").onclick = ()=>{
  const v = document.getElementById("codeInput").value.trim();
  if(/^\d{6}$/.test(v)){ setCode(v); analyze(); }
  else { document.getElementById("err").textContent = "종목코드 6자리를 입력해주세요 (예: 005930)"; }
};
document.getElementById("codeInput").addEventListener("keydown", e=>{
  if(e.key==="Enter") document.getElementById("goBtn").click();
});
document.getElementById("analyzeBtn").onclick = analyze;
window.addEventListener("resize", ()=>{ if(lastRows) drawChart(lastRows); });

renderChips();
setCode(current);
analyze();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>오늘, 사도 될까 — 국내</title>
<meta name="theme-color" content="#0E1320">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  :root{
    --bg:#0E1320; --card:#171E2E; --card2:#1D2638; --line:#26314A;
    --text:#EDEAE3; --dim:#8B94A8;
    --buy:#FF4D5E; --sell:#4D8CFF; --hold:#E8B454;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    padding:18px 14px calc(40px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:480px; margin:0 auto;}
  .eyebrow{font-size:11px; letter-spacing:.22em; color:var(--dim); font-weight:700;}
  h1{font-size:26px; font-weight:800; margin:4px 0 12px; letter-spacing:-0.02em;}
  .tabs{display:flex; gap:6px; margin-bottom:16px; background:var(--card); padding:5px;
    border-radius:14px; border:1px solid var(--line);}
  .tab{flex:1; text-align:center; padding:9px 0; border-radius:10px; font-size:13px; font-weight:700;
    color:var(--dim); text-decoration:none; cursor:pointer;}
  .tab.on{background:var(--text); color:var(--bg);}
  .chips{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:8px;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    padding:8px 14px; border-radius:999px; border:1px solid var(--line);
    background:transparent; color:var(--dim); font-size:13px; font-weight:700;
    white-space:nowrap; cursor:pointer; font-family:inherit;
  }
  .chip.on{background:var(--text); color:var(--bg); border-color:var(--text);}
  .row{display:flex; gap:8px; margin-bottom:14px;}
  .acbox{position:absolute; top:54px; left:0; right:0; background:var(--card); border:1px solid var(--line);
    border-radius:12px; z-index:9999; display:none; max-height:50vh; overflow-y:auto;
    -webkit-overflow-scrolling:touch; box-shadow:0 8px 24px rgba(0,0,0,.5);}
  .acitem{padding:11px 14px; border-top:1px solid var(--line); cursor:pointer; font-size:13.5px;}
  .acitem:first-child{border-top:none;}
  .acitem:hover{background:var(--card2);}
  .acitem .sym{font-weight:800;}
  .acitem .nm{color:var(--dim); font-size:12px; margin-left:6px;}
  .weather-hero{position:relative; height:110px; border-radius:16px; overflow:hidden;
    margin-bottom:12px; border:1px solid var(--line);}
  .wh-sky{position:absolute; inset:0; transition:background 1s ease;}
  .wh-content{position:relative; z-index:2; height:100%; display:flex; align-items:center; gap:16px; padding:0 20px;}
  .wh-icon{font-size:48px; line-height:1; filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
  .wh-label{font-size:20px; font-weight:800; letter-spacing:-0.02em;}
  .wh-sub{font-size:12px; opacity:.85; margin-top:3px; line-height:1.4;}
  .sky-sunny{background:linear-gradient(135deg,#1a4a7a,#2d7ab8 60%,#48a0d8);}
  .sky-partly{background:linear-gradient(135deg,#2a3a55,#456590 70%,#5a7a9a);}
  .sky-cloudy{background:linear-gradient(135deg,#2a3245,#404a60 70%,#525a6e);}
  .sky-rain{background:linear-gradient(135deg,#1e2535,#2a3548 70%,#35435a);}
  .sky-storm{background:linear-gradient(135deg,#15151f,#252535 60%,#1a1a2e);}
  .wh-drop{position:absolute; width:2px; height:14px; background:rgba(170,200,230,.5);
    border-radius:2px; animation:fall linear infinite; z-index:1;}
  @keyframes fall{0%{transform:translateY(-20px)}100%{transform:translateY(130px)}}
  @media (prefers-reduced-motion: reduce){.wh-drop{display:none}}
  .krw-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}
  .krw-card{background:var(--card2); border:1px solid var(--line); border-radius:12px; padding:11px;}
  .krw-name{font-size:11px; color:var(--dim); font-weight:700;}
  .krw-val{font-size:16px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums;}
  .krw-chg{font-size:11px; font-weight:700; margin-left:5px;}
  input[type=text]{
    flex:1; min-width:0; background:var(--card); border:1px solid var(--line); border-radius:12px;
    color:var(--text); font-size:14px; font-weight:700; padding:11px 14px; font-family:inherit;
  }
  input[type=text]::placeholder{color:var(--dim); font-weight:500;}
  .btn{
    padding:11px 18px; border-radius:12px; border:none; background:var(--text); color:var(--bg);
    font-weight:800; font-size:14px; cursor:pointer; font-family:inherit;
  }
  .btn:disabled{opacity:.5;}
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:18px;
    margin-bottom:12px; overflow:hidden;
  }
  #chartbox{height:300px; position:relative;}
  #chartbox canvas{width:100%; height:100%; display:block;}
  .pad{padding:16px;}
  .sec-title{font-size:12.5px; font-weight:700; color:var(--dim); margin-bottom:10px;}
  details.fold{margin:0;}
  details.fold summary{list-style:none; cursor:pointer; display:flex; align-items:center;
    justify-content:space-between; gap:10px;}
  details.fold summary::-webkit-details-marker{display:none;}
  .fold-title{font-size:14px; font-weight:800; color:var(--text); display:flex; align-items:center; gap:8px;}
  .fold-sum{font-size:13px; font-weight:700; color:var(--dim); display:flex; align-items:center; gap:8px;}
  .fold-chev{transition:transform .25s ease; color:var(--dim); font-size:13px;}
  details.fold[open] .fold-chev{transform:rotate(180deg);}
  .fold-body{margin-top:14px;}
  @media (prefers-reduced-motion: reduce){.fold-chev{transition:none}}
  .verdict-top{display:flex; justify-content:space-between; align-items:flex-start;}
  .price{font-size:30px; font-weight:800; font-variant-numeric:tabular-nums;}
  .chg{font-size:14px; font-weight:700; margin-left:8px;}
  .glyph{font-size:30px; line-height:1; text-align:center;}
  .vlabel{font-size:14px; font-weight:800; margin-top:4px; text-align:center;}
  .vscore{font-size:11px; color:var(--dim); margin-top:2px; text-align:center; font-variant-numeric:tabular-nums;}
  .gauge{position:relative; height:8px; border-radius:99px; margin-top:16px;
    background:linear-gradient(90deg,var(--sell),var(--hold) 50%,var(--buy)); opacity:.92;}
  .knob{position:absolute; top:-4px; width:16px; height:16px; border-radius:99px;
    background:var(--text); border:3px solid var(--bg); box-shadow:0 1px 4px rgba(0,0,0,.5);}
  .gauge-labels{display:flex; justify-content:space-between; font-size:10.5px; color:var(--dim); margin-top:6px;}
  .sig{display:flex; gap:12px; align-items:flex-start; padding:13px 14px;
    background:var(--card2); border:1px solid var(--line); border-radius:14px; margin-bottom:8px;}
  .tag{min-width:64px; text-align:center; padding:5px 0; border-radius:8px; font-size:12px; font-weight:800;}
  .t-buy{background:rgba(255,77,94,.15); color:var(--buy);}
  .t-sell{background:rgba(77,140,255,.15); color:var(--sell);}
  .t-hold{background:rgba(232,180,84,.15); color:var(--hold);}
  .sig-name{font-size:13.5px; font-weight:700; margin-bottom:3px;}
  .sig-detail{font-size:12.5px; color:var(--dim); line-height:1.5;}
  .note{font-size:11px; color:var(--dim); line-height:1.65; margin-top:16px;}
  .err{font-size:12.5px; color:var(--buy); margin:8px 0; line-height:1.5;}
  .muted{font-size:11.5px; color:var(--dim); line-height:1.55;}
  .switch{font-size:11px; color:var(--sell); text-decoration:none; font-weight:700;
    border:1px solid var(--line); padding:5px 10px; border-radius:99px; letter-spacing:0;}
  .naver{display:inline-block; margin-top:8px; color:var(--sell); font-size:12px; font-weight:700; text-decoration:none;}
  .spin{display:inline-block; width:14px; height:14px; border:2px solid var(--bg);
    border-top-color:transparent; border-radius:99px; animation:sp .7s linear infinite; vertical-align:-2px;}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">KR STOCK · SIGNAL</div>
  <h1>오늘, 사도 될까</h1>
  <div class="tabs">
    <a class="tab" href="index.html">🇺🇸 해외</a>
    <a class="tab on">🇰🇷 국내</a>
    <a class="tab" href="news.html">📰 뉴스</a>
  </div>

  <div class="chips" id="chips"></div>
  <div class="row" style="position:relative;">
    <input type="text" id="codeInput" placeholder="종목명/코드 검색 (예: 삼성전자 또는 005930)" maxlength="20" autocomplete="off">
    <button class="btn" id="goBtn">보기</button>
    <div id="acBox" class="acbox"></div>
  </div>

  <div class="card"><div id="chartbox"><canvas id="chart"></canvas></div></div>

  <div class="card pad">
    <div class="sec-title" id="sigTitle">종목을 선택하거나 코드를 입력하세요</div>
    <button class="btn" id="analyzeBtn" style="width:100%; padding:14px;">실시간 데이터로 신호 분석</button>
    <div id="err" class="err"></div>
    <a id="naverLink" class="naver" href="#" target="_blank" rel="noopener" style="display:none;">📊 네이버 금융에서 자세히 보기 →</a>
  </div>

  <div class="card pad" id="result" style="display:none;">
    <div class="verdict-top">
      <div>
        <div class="muted" id="vTicker"></div>
        <div><span class="price" id="vPrice"></span><span class="chg" id="vChg"></span></div>
        <div class="muted" id="vDate" style="margin-top:2px;"></div>
      </div>
      <div>
        <div class="glyph" id="vGlyph"></div>
        <div class="vlabel" id="vLabel"></div>
        <div class="vscore" id="vScore"></div>
      </div>
    </div>
    <div class="gauge"><div class="knob" id="knob"></div></div>
    <div class="gauge-labels"><span>매도</span><span>관망</span><span>매수</span></div>
    <div id="sigList" style="margin-top:16px;"></div>
    <div class="note">
      신호 판정은 일별 종가 기준의 기계적 해석일 뿐 투자 권유가 아니며, 미래 수익을 보장하지 않아요.
      매매 전 기업 실적과 시장 환경도 함께 확인하세요. · 데이터: Yahoo Finance
    </div>
  </div>

  <!-- 한국 시장 날씨 -->
  <div class="card pad">
    <details class="fold" id="weatherFold">
      <summary>
        <span class="fold-title">🇰🇷 국내 시장 날씨</span>
        <span class="fold-sum"><span id="weatherSummary">측정 중...</span><span class="fold-chev">▼</span></span>
      </summary>
      <div class="fold-body">
        <div class="weather-hero" id="weatherHero">
          <div class="wh-sky" id="whSky"></div>
          <div class="wh-content">
            <div class="wh-icon" id="whIcon">⛅</div>
            <div class="wh-text">
              <div class="wh-label" id="whLabel">시장 날씨 측정 중...</div>
              <div class="wh-sub" id="whSub">잠시만요</div>
            </div>
          </div>
        </div>
        <div class="krw-grid" id="krwGrid"></div>
      </div>
    </details>
  </div>

</div>

const KR_DICT_MAP = {};
KR_DICT.forEach(([name,code])=>{ if(code!=="null") KR_DICT_MAP[name.toLowerCase()] = {code, name}; });
function searchDict(q){
  const ql = q.toLowerCase().replace(/\s/g,"");
  const hits = [];
  for(const [name, code] of KR_DICT){
    if(code==="null") continue;
    const nl = name.toLowerCase().replace(/\s/g,"");
    if(nl.includes(ql) || ql.includes(nl)){
      if(!hits.find(h=>h.code===code)) hits.push({code, name, ex:"코스피/코스닥"});
    }
  }
  return hits.slice(0,10);
}
let lastRows = null;
const chipsEl = document.getElementById("chips");
function krName(code){ const f = KR_PRESETS.find(k=>k.code===code); if(f && f.name!==code) return f.name; return knownNames[code] || code; }
function renderChips(){
  chipsEl.innerHTML = "";
  KR_PRESETS.forEach(k=>{
    const b = document.createElement("button");
    b.className = "chip" + (k.code===current ? " on" : "");
    b.textContent = k.name;
    b.onclick = ()=>setCode(k.code);
    if(k.code === current && KR_PRESETS.length > 1){
      const x = document.createElement("span");
      x.textContent = " ✕";
      x.style.cssText = "opacity:.6; font-weight:900;";
      x.onclick = (e)=>{ e.stopPropagation(); removeKrFav(k.code); };
      b.appendChild(x);
    }
    chipsEl.appendChild(b);
  });
  // 현재 종목이 즐겨찾기에 없으면 추가 칩
  if(!KR_PRESETS.find(k=>k.code===current)){
    const add = document.createElement("button");
    add.className = "chip";
    add.style.cssText = "color:var(--hold); border-color:var(--hold);";
    add.textContent = "⭐ " + current + " 추가";
    add.onclick = ()=>addKrFav(current);
    chipsEl.appendChild(add);
  }
}
function addKrFav(code){
  if(code && !KR_PRESETS.find(k=>k.code===code)){

// 차트만 불러와 그리기 (신호 분석과 별개)
async function loadChartOnly(){
  const box = document.getElementById("chartbox");
  // 로딩 표시
  const cv = document.getElementById("chart");
  const ctx = cv.getContext("2d");
  const W = box.clientWidth, H = box.clientHeight;

    ctx.fillText("차트를 불러오지 못했어요", W/2, H/2);
  }
}

async function yahooFetch(ysym){
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?range=1y&interval=1d`;
  const tries = [
    base,
    `https://corsproxy.io/?url=${encodeURIComponent(base)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`,
    `https://api.codetabs.com/v1/proxy/?quest=${encodeURIComponent(base)}`
  ];
  let lastErr = null;
  for(const url of tries){
    try{
      const res = await fetch(url, {signal: AbortSignal.timeout(13000)});
      if(!res.ok) throw new Error("HTTP " + res.status);
      const json = await res.json();
      const r = json?.chart?.result?.[0];
      if(!r) throw new Error("형식 오류");
      const ts = r.timestamp || [];
      const q = r.indicators?.quote?.[0] || {};
      const closes = q.close || [], vols = q.volume || [];
      const out = [];
      for(let i=0;i<ts.length;i++){
        const c = closes[i];
        if(c==null || !isFinite(c)) continue;
        const d = new Date(ts[i]*1000);
        const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        out.push({date:ds, close:c, volume:(vols[i]||0)});
      }
      if(out.length >= 25) return out.slice(-160);
      throw new Error("데이터 부족");
    }catch(e){ lastErr = e; }
  }
  throw lastErr || new Error("불러오기 실패");
}
async function fetchDailyKR(code){
  try{ return await yahooFetch(code + ".KS"); }
  catch(e1){
    try{ return await yahooFetch(code + ".KQ"); }
    catch(e2){ throw new Error("국내 시세 불러오기 실패. 잠시 후 다시 시도하거나, 종목코드(6자리)를 확인해주세요."); }
  }
}

function sma(arr,n,i){ if(i<n-1) return null; let s=0; for(let k=i-n+1;k<=i;k++) s+=arr[k]; return s/n; }
function compute(series){
  const closes = series.map(r=>r.close), vols = series.map(r=>r.volume);
  const rows = series.map((r,i)=>{
    const ma5=sma(closes,5,i), ma20=sma(closes,20,i);
    let upper=null, lower=null;
    if(i>=19){
      let sq=0; for(let k=i-19;k<=i;k++) sq += (closes[k]-ma20)**2;
      const sd=Math.sqrt(sq/20); upper=ma20+2*sd; lower=ma20-2*sd;
    }
    return {...r, ma5, ma20, upper, lower, volAvg20:sma(vols,20,i)};
  });
  let g=0,l=0;
  for(let i=1;i<rows.length;i++){
    const ch=closes[i]-closes[i-1], gain=Math.max(ch,0), loss=Math.max(-ch,0);
    if(i<=14){ g+=gain/14; l+=loss/14; rows[i].rsi = i===14 ? 100-100/(1+(l===0?100:g/l)) : null; }
    else{ g=(g*13+gain)/14; l=(l*13+loss)/14; rows[i].rsi = 100-100/(1+(l===0?100:g/l)); }
  }
  return rows;
}
/* ── 예상 변동성 (과거 수익률 표준편차 기반) ── */
function volRange(rows, days){
  const closes = rows.map(r=>r.close);
  if(closes.length < days+1) days = closes.length-1;
  const rets = [];
  for(let i=closes.length-days; i<closes.length; i++){
    if(i>0) rets.push(Math.log(closes[i]/closes[i-1]));
  }
  const mean = rets.reduce((a,b)=>a+b,0)/rets.length;
  const variance = rets.reduce((a,b)=>a+(b-mean)**2,0)/rets.length;
  const dailySd = Math.sqrt(variance);        // 일간 변동성
  const annual = dailySd * Math.sqrt(252);    // 연율화
  const price = closes[closes.length-1];
  // 1σ·2σ 가격 범위 (현재가 기준)
  return {
    dailyPct: dailySd*100,
    annualPct: annual*100,
    s1: [price*Math.exp(-dailySd), price*Math.exp(dailySd)],
    s2: [price*Math.exp(-2*dailySd), price*Math.exp(2*dailySd)],
    price
  };
}

/* ── OBV (On-Balance Volume, 매집 흔적) ── */
function obvSignal(rows){
  // OBV 누적 계산
  let obv = 0; const series = [];
  for(let i=0;i<rows.length;i++){
    if(i>0){
      if(rows[i].close > rows[i-1].close) obv += rows[i].volume;
      else if(rows[i].close < rows[i-1].close) obv -= rows[i].volume;
    }
    series.push(obv);
  }
  // 최근 20일 OBV 추세 vs 가격 추세 비교 (다이버전스 탐지)
  const n = Math.min(20, series.length-1);
  const obvNow = series[series.length-1], obvPast = series[series.length-1-n];
  const priceNow = rows[rows.length-1].close, pricePast = rows[rows.length-1-n].close;
  const obvUp = obvNow > obvPast;
  const priceUp = priceNow > pricePast;
  const obvSlope = obvPast!==0 ? ((obvNow-obvPast)/Math.abs(obvPast))*100 : 0;
  let v="hold", s=0, d="";
  if(obvUp && priceUp){ v="buy"; s=0.5; d="OBV·가격 동반 상승 — 거래량이 상승을 뒷받침 (건강한 상승)"; }
  else if(obvUp && !priceUp){ v="buy"; s=1; d="가격은 횡보/하락인데 OBV 상승 — 몰래 매집 흔적 (강세 다이버전스)"; }
  else if(!obvUp && priceUp){ v="sell"; s=-1; d="가격은 오르는데 OBV 하락 — 거래량 뒷받침 약함 (약세 다이버전스, 주의)"; }
  else { v="sell"; s=-0.5; d="OBV·가격 동반 하락 — 매도세 우위, 자금 이탈 중"; }
  return {name:"OBV (자금 흐름)", v, s, d};
}

/* ── 피보나치 되돌림 (최근 90일 고저 기준) ── */
function fibLevels(rows){
  const data = rows.slice(-90);
  let hi=-Infinity, lo=Infinity, hiIdx=0, loIdx=0;
  data.forEach((r,i)=>{ if(r.close>hi){hi=r.close;hiIdx=i;} if(r.close<lo){lo=r.close;loIdx=i;} });
  const upTrend = loIdx < hiIdx; // 저점이 먼저면 상승 추세
  const diff = hi - lo;
  const ratios = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
  // 상승추세: 고점에서 되돌림(아래로), 하락추세: 저점에서 되돌림(위로)
  const levels = ratios.map(r=>({
    ratio: r,
    price: upTrend ? hi - diff*r : lo + diff*r
  }));
  return {hi, lo, upTrend, levels};
}

/* ── 백테스트 (이 신호대로 과거 1년 매매했다면?) ── */
function backtest(rows){
  function scoreAt(idx){
    const sub = rows.slice(0, idx+1);
    if(sub.length < 25) return 0;
    const last = sub[sub.length-1];
    let total = 0;
    if(last.ma20!=null) total += last.close > last.ma20 ? 1 : -1;
    for(let i=sub.length-7;i<sub.length;i++){
      const p=sub[i-1], c=sub[i];
      if(!p?.ma5||!p?.ma20||!c?.ma5||!c?.ma20) continue;
      if(p.ma5<=p.ma20 && c.ma5>c.ma20) total += 1.5;
      if(p.ma5>=p.ma20 && c.ma5<c.ma20) total -= 1.5;
    }
    if(last.rsi!=null){ if(last.rsi<=30) total+=1; else if(last.rsi>=70) total-=1; }
    if(last.upper!=null){
      const pos=(last.close-last.lower)/(last.upper-last.lower);
      if(pos<=0.15) total+=1; else if(pos>=0.85) total-=1;
    }
    return total;
  }
  let cash = 10000, shares = 0, trades = 0, wins = 0, buyPrice = 0;
  const startIdx = Math.max(25, rows.length - 252);
  const startPrice = rows[startIdx].close;
  for(let i=startIdx;i<rows.length;i++){
    const score = scoreAt(i);
    const price = rows[i].close;
    if(score >= 1.5 && shares === 0 && cash > 0){
      shares = cash / price; cash = 0; buyPrice = price; trades++;
    } else if(score <= -1.5 && shares > 0){
      cash = shares * price;
      if(price > buyPrice) wins++;
      shares = 0;
    }
  }
  const lastPrice = rows[rows.length-1].close;
  const finalValue = cash + shares * lastPrice;
  const stratReturn = (finalValue/10000 - 1) * 100;
  const holdReturn = (lastPrice/startPrice - 1) * 100;
  const winRate = trades>0 ? (wins/trades*100) : 0;
  return { stratReturn, holdReturn, trades, winRate, hasOpen: shares>0 };
}

function judge(rows){
  const last = rows[rows.length-1];
  const sigs = [];
  if(last.ma20!=null){
    const above = last.close > last.ma20;
    const gap = ((last.close-last.ma20)/last.ma20)*100;
    sigs.push({name:"20일 이동평균선", v:above?"buy":"sell", s:above?1:-1,
      d: above ? `주가가 20일선보다 ${gap.toFixed(1)}% 위 — 단기 추세 양호`
               : `주가가 20일선보다 ${Math.abs(gap).toFixed(1)}% 아래 — 추세 이탈 주의`});
  }
  let cross=null;
  for(let i=rows.length-7;i<rows.length;i++){
    const p=rows[i-1], c=rows[i];
    if(!p?.ma5||!p?.ma20||!c?.ma5||!c?.ma20) continue;
    if(p.ma5<=p.ma20 && c.ma5>c.ma20) cross={t:"g", date:c.date};
    if(p.ma5>=p.ma20 && c.ma5<c.ma20) cross={t:"d", date:c.date};
  }
  sigs.push({name:"골든 / 데드크로스", v:cross?(cross.t==="g"?"buy":"sell"):"hold", s:cross?(cross.t==="g"?1.5:-1.5):0,
    d: cross ? `${cross.date} ${cross.t==="g"?"골든크로스 발생 — 강한 매수 신호":"데드크로스 발생 — 매도 신호"}`
             : "최근 7거래일 내 교차 없음 — 추세 유지 중"});
  if(last.rsi!=null){
    const r=last.rsi;
    sigs.push({name:"RSI (14)", v:r<=30?"buy":r>=70?"sell":"hold", s:r<=30?1:r>=70?-1:0,
      d: r<=30 ? `RSI ${r.toFixed(0)} — 과매도 구간, 반등 노릴 자리`
        : r>=70 ? `RSI ${r.toFixed(0)} — 과열 구간, 매도 준비`
        : `RSI ${r.toFixed(0)} — 중립 구간 (30~70)`});
  }
  if(last.upper!=null){
    const pos=(last.close-last.lower)/(last.upper-last.lower);
    sigs.push({name:"볼린저 밴드", v:pos<=0.15?"buy":pos>=0.85?"sell":"hold", s:pos<=0.15?1:pos>=0.85?-1:0,
      d: pos<=0.15 ? "밴드 하단 근접 — 통계적 저점 영역"
        : pos>=0.85 ? "밴드 상단 근접 — 통계적 고점 영역"
        : `밴드 내 ${(pos*100).toFixed(0)}% 위치 — 중간 영역`});
  }
  if(last.volAvg20!=null && last.volAvg20>0){
    const ratio=last.volume/last.volAvg20;
    const prev=rows[rows.length-2];
    const up = prev ? last.close>=prev.close : true;
    const ok = ratio>=1.2;
    sigs.push({name:"거래량 확인", v:ok?(up?"buy":"sell"):"hold", s:ok?(up?0.5:-0.5):0,
      d: ok ? `평균 대비 ${(ratio*100).toFixed(0)}% 거래량 — ${up?"상승에 힘이 실림":"하락에 매물 출회 — 경계"}`
            : `평균 대비 ${(ratio*100).toFixed(0)}% — 거래량 평이`});
  }
  // OBV 신호
  sigs.push(obvSignal(rows));

  // 피보나치 되돌림 신호
  const fib = fibLevels(rows);
  const price = last.close;
  // 현재가가 어느 피보 레벨에 가까운지
  let nearest = fib.levels[0], minDist = Infinity;
  fib.levels.forEach(l=>{ const d=Math.abs(price-l.price); if(d<minDist){minDist=d;nearest=l;} });
  const nearPct = (nearest.ratio*100).toFixed(1);
  const distPct = (minDist/price*100);
  // 38.2~61.8% 되돌림 구간이면 지지/저항 주목 구간
  const inZone = nearest.ratio>=0.382 && nearest.ratio<=0.618 && distPct<2;
  let fibV="hold", fibS=0, fibD="";
  if(distPct < 1.5){
    if(nearest.ratio===0.618 || nearest.ratio===0.5){
      fibV="buy"; fibS=0.5;
      fibD=`현재가가 ${nearPct}% 되돌림선 부근 — 강한 지지/매수 관심 구간`;
    } else if(nearest.ratio===0.236){
      fibV="hold"; fibS=0;
      fibD=`현재가가 ${nearPct}% 얕은 되돌림 — 추세 강함, 눌림목 주목`;
    } else {
      fibD=`현재가가 ${nearPct}% 되돌림선 부근 — 지지/저항 주목`;
    }
  } else {
    fibD=`되돌림선과 거리 있음 (가장 가까운 선: ${nearPct}%) — 뚜렷한 지지/저항 미접근`;
  }
  sigs.push({name:"피보나치 되돌림", v:fibV, s:fibS, d:fibD});

  const total = sigs.reduce((a,x)=>a+x.s,0);
  const overall = total>=1.5?"buy":total<=-1.5?"sell":"hold";
  const vol20 = volRange(rows, 20);
  const vol60 = volRange(rows, 60);
  const bt = backtest(rows);
  return {sigs, total, overall, last, prev:rows[rows.length-2], rows, fib, vol20, vol60, bt};
}

function drawChart(rows){
  const cv = document.getElementById("chart");
  const box = document.getElementById("chartbox");
  const dpr = window.devicePixelRatio || 1;
  const W = box.clientWidth, H = box.clientHeight;
  if(!W || !H) return;
  cv.width = W*dpr; cv.height = H*dpr;
  const ctx = cv.getContext("2d");
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,W,H);
  const data = rows.slice(-90);
  const pad = {l:8, r:60, t:16, b:22};
  const xs = (i)=> pad.l + (W-pad.l-pad.r) * (i/(data.length-1));
  let min=Infinity, max=-Infinity;
  data.forEach(r=>{ min=Math.min(min,r.close); max=Math.max(max,r.close);
    if(r.ma20!=null){min=Math.min(min,r.ma20);max=Math.max(max,r.ma20);} });
  const sp=(max-min)||1; min-=sp*0.08; max+=sp*0.08;
  const ys=(v)=> pad.t + (H-pad.t-pad.b) * (1-(v-min)/(max-min));
  ctx.strokeStyle="#26314A"; ctx.fillStyle="#8B94A8"; ctx.font="10px sans-serif"; ctx.textAlign="left";
  for(let g=0; g<=3; g++){
    const v=min+(max-min)*g/3, y=ys(v);
    ctx.globalAlpha=.35; ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.globalAlpha=1; ctx.fillText("₩"+Math.round(v).toLocaleString(), W-pad.r+5, y+3);
  }
  // X축 날짜 라벨 (4개 균등)
  ctx.fillStyle="#8B94A8"; ctx.font="9px sans-serif";
  const nLabels = 4;
  for(let k=0; k<nLabels; k++){
    const idx = Math.round((data.length-1) * k/(nLabels-1));
    const r = data[idx];
    if(!r || !r.date) continue;
    const md = r.date.slice(5);  // MM-DD
    const x = xs(idx);
    ctx.textAlign = k===0 ? "left" : (k===nLabels-1 ? "right" : "center");
    ctx.fillText(md, Math.max(pad.l, Math.min(W-pad.r, x)), H-7);
    // 옅은 세로 격자
    ctx.globalAlpha=.2; ctx.strokeStyle="#26314A"; ctx.beginPath();
    ctx.moveTo(x, pad.t); ctx.lineTo(x, H-pad.b); ctx.stroke(); ctx.globalAlpha=1;
  }
  ctx.textAlign="left";
  const line=(key,color,w)=>{
    ctx.strokeStyle=color; ctx.lineWidth=w; ctx.beginPath(); let st=false;
    data.forEach((r,i)=>{ const v=key==="close"?r.close:r[key]; if(v==null) return;
      const x=xs(i), y=ys(v); if(!st){ctx.moveTo(x,y);st=true;} else ctx.lineTo(x,y); });
    ctx.stroke();
  };
  line("ma20","#4D8CFF",1.2);
  line("ma5","#E8B454",1.2);
  const upTrend = data[data.length-1].close >= data[0].close;
  line("close", upTrend ? "#FF4D5E" : "#4D8CFF", 1.8);
  // 피보나치 되돌림 선 (점선)
  const fib = fibLevels(rows);
  ctx.setLineDash([3,3]); ctx.lineWidth=0.8;
  fib.levels.forEach(l=>{
    if(l.price<min||l.price>max) return;
    const y=ys(l.price);
    ctx.strokeStyle="rgba(232,180,84,.45)"; ctx.beginPath();
    ctx.moveTo(pad.l,y); ctx.lineTo(W-pad.r,y); ctx.stroke();
    ctx.fillStyle="rgba(232,180,84,.8)"; ctx.font="9px sans-serif"; ctx.textAlign="left";
    ctx.fillText((l.ratio*100).toFixed(1)+"%", pad.l+2, y-2);
  });
  ctx.setLineDash([]);
  ctx.textAlign="left"; ctx.font="10px sans-serif";
  ctx.fillStyle="#FF4D5E"; ctx.fillText("● 종가", pad.l, 11);
  ctx.fillStyle="#E8B454"; ctx.fillText("● 5일", pad.l+44, 11);
  ctx.fillStyle="#4D8CFF"; ctx.fillText("● 20일", pad.l+82, 11);
}

const V = {
  buy:  {g:"🔴", label:"매수 우위", color:"var(--buy)"},
  sell: {g:"🔵", label:"매도 우위", color:"var(--sell)"},
  hold: {g:"🟡", label:"관망", color:"var(--hold)"},
};
function render(res){

  document.getElementById("vTicker").textContent = `${krName(current)} (${current})`;
  document.getElementById("vPrice").textContent = "₩" + Math.round(res.last.close).toLocaleString();
  const chg = res.prev ? ((res.last.close-res.prev.close)/res.prev.close)*100 : 0;
  const chgEl = document.getElementById("vChg");
  chgEl.textContent = (chg>=0?"+":"") + chg.toFixed(2) + "%";
  chgEl.style.color = chg>=0 ? "var(--buy)" : "var(--sell)";
  document.getElementById("vDate").textContent = res.last.date + " 종가 기준";
  document.getElementById("vGlyph").textContent = v.g;
  document.getElementById("vLabel").textContent = v.label;
  document.getElementById("vLabel").style.color = v.color;
  document.getElementById("vScore").textContent = `종합 ${res.total>=0?"+":""}${res.total.toFixed(1)}`;
  const pct = Math.max(0, Math.min(100, (res.total+5)/10*100));
  document.getElementById("knob").style.left = `calc(${pct}% - 8px)`;
  const list = document.getElementById("sigList");
  list.innerHTML = "";
  res.sigs.forEach(s=>{
    const tagCls = s.v==="buy"?"t-buy":s.v==="sell"?"t-sell":"t-hold";
    const tagTxt = s.v==="buy"?"매수":s.v==="sell"?"매도":"관망";
    const el = document.createElement("div");
    el.className = "sig";
    el.innerHTML = `<span class="tag ${tagCls}">${tagTxt}</span>
      <div><div class="sig-name">${s.name}</div><div class="sig-detail">${s.d}</div></div>`;
    list.appendChild(el);
  });
  // 예상 변동성 표
  const won = (n)=>"₩"+Math.round(n).toLocaleString();
  const volHtml = `
    <div style="margin-top:14px; padding:13px 14px; background:var(--card2); border:1px solid var(--line); border-radius:14px;">
      <div style="font-size:12px; font-weight:700; color:var(--dim); margin-bottom:8px;">📊 예상 변동성 (통계적 가격 범위)</div>
      <div style="font-size:12px; color:var(--dim); margin-bottom:8px;">
        20일 일간 변동성 ${res.vol20.dailyPct.toFixed(1)}% · 연율 ${res.vol20.annualPct.toFixed(0)}%</div>
      <div style="font-size:12.5px; line-height:1.9;">
        <div style="display:flex; justify-content:space-between;"><span style="color:var(--hold);">1σ 범위 (~68%)</span>
          <span style="font-variant-numeric:tabular-nums;">${won(res.vol20.s1[0])} ~ ${won(res.vol20.s1[1])}</span></div>
        <div style="display:flex; justify-content:space-between;"><span style="color:var(--sell);">2σ 범위 (~95%)</span>
          <span style="font-variant-numeric:tabular-nums;">${won(res.vol20.s2[0])} ~ ${won(res.vol20.s2[1])}</span></div>
        <div style="display:flex; justify-content:space-between; margin-top:6px; padding-top:6px; border-top:1px solid var(--line); color:var(--dim); font-size:11.5px;">
          <span>60일 기준 1σ</span>
          <span style="font-variant-numeric:tabular-nums;">${won(res.vol60.s1[0])} ~ ${won(res.vol60.s1[1])}</span></div>
      </div>
    </div>`;
  document.getElementById("sigList").insertAdjacentHTML("beforeend", volHtml);

  // 백테스트 맛보기
  if(res.bt){
    const bt = res.bt;
    const stratColor = bt.stratReturn >= 0 ? "var(--buy)" : "var(--sell)";
    const holdColor = bt.holdReturn >= 0 ? "var(--buy)" : "var(--sell)";
    const win = bt.stratReturn >= bt.holdReturn;
    const btHtml = `
      <div style="margin-top:12px; padding:13px 14px; background:var(--card2); border:1px solid var(--line); border-radius:14px;">
        <div style="font-size:12px; font-weight:700; color:var(--dim); margin-bottom:8px;">🔬 백테스트 — 이 신호대로 지난 1년 매매했다면?</div>
        <div style="font-size:12.5px; line-height:1.95;">
          <div style="display:flex; justify-content:space-between;"><span>📊 신호 따라 매매</span>
            <span style="font-weight:800; color:${stratColor}; font-variant-numeric:tabular-nums;">${bt.stratReturn>=0?"+":""}${bt.stratReturn.toFixed(1)}%</span></div>
          <div style="display:flex; justify-content:space-between;"><span style="color:var(--dim);">🤲 그냥 보유했다면</span>
            <span style="font-weight:700; color:${holdColor}; font-variant-numeric:tabular-nums;">${bt.holdReturn>=0?"+":""}${bt.holdReturn.toFixed(1)}%</span></div>
          <div style="display:flex; justify-content:space-between; margin-top:6px; padding-top:6px; border-top:1px solid var(--line); color:var(--dim); font-size:11.5px;">
            <span>매매 ${bt.trades}회 · 승률 ${bt.winRate.toFixed(0)}%</span>
            <span style="color:${win?'var(--buy)':'var(--dim)'};">${win?"✓ 신호가 더 나았음":"보유가 나았음"}</span></div>
        </div>
        <div style="font-size:10.5px; color:var(--dim); margin-top:8px; line-height:1.5;">
          ※ 과거 결과일 뿐 미래를 보장하지 않아요. 수수료·세금 미반영, 종가 기준 단순 시뮬레이션이에요.</div>
      </div>`;
    document.getElementById("sigList").insertAdjacentHTML("beforeend", btHtml);
  }

  lastRows = res.rows;
  drawChart(res.rows);
}

/* ── 종목 자동완성 (야후 검색에서 한국 .KS/.KQ 필터) ── */
const acBox = document.getElementById("acBox");
const tickerInput = document.getElementById("codeInput");
let acTimer = null;
async function searchKR(q){
  // 1순위: 한글 사전 (한글 검색 대응)
  const dictHits = searchDict(q);
  // 한글이 포함된 검색이면 사전 결과를 우선 반환
  if(dictHits.length && /[가-힣]/.test(q)) return dictHits;

  const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&quotesCount=14&newsCount=0`;
  const enc = encodeURIComponent(url);
  const pickKR = (quotes)=> quotes
    .filter(x=> x.symbol && (x.symbol.endsWith(".KS")||x.symbol.endsWith(".KQ")))
    .map(x=>({
      code: x.symbol.replace(/\.(KS|KQ)$/,""),
      name: x.shortname || x.longname || x.symbol,
      ex: x.symbol.endsWith(".KS") ? "코스피" : "코스닥"
    }));
  // allorigins JSON 우선
  try{
    const res = await fetch(`https://api.allorigins.win/get?url=${enc}`, {signal:AbortSignal.timeout(9000)});
    if(res.ok){
      const j = await res.json();
      if(j && j.contents){
        const data = JSON.parse(j.contents);
        if(data.quotes){ const r = pickKR(data.quotes); if(r.length) return r; }
      }
    }
  }catch(e){}
  const tries = [
    `https://corsproxy.io/?url=${enc}`,
    `https://api.allorigins.win/raw?url=${enc}`,
    url
  ];
  for(const u of tries){
    try{
      const res = await fetch(u, {signal:AbortSignal.timeout(8000)});
      if(!res.ok) continue;
      const j = await res.json();
      if(j.quotes){ const r = pickKR(j.quotes); if(r.length) return r; }
    }catch(e){}
  }
  // 야후도 실패하면 사전 결과라도 (한글 아닌 경우 포함)
  return dictHits;
}
function showAc(list){
  if(!list.length){ acBox.style.display="none"; return; }
  acBox.innerHTML = list.map(x=>
    `<div class="acitem" data-code="${x.code}" data-name="${x.name}"><span class="sym">${x.name}</span><span class="nm">${x.code} · ${x.ex}</span></div>`
  ).join("");
  acBox.style.display = "block";
  acBox.querySelectorAll(".acitem").forEach(el=>{
    // mousedown/touchstart로 잡아야 input blur·document click보다 먼저 실행됨
    const pick = (ev)=>{
      ev.preventDefault();
      ev.stopPropagation();
      const code = el.dataset.code, name = el.dataset.name;
      knownNames[code] = name;
      const f = KR_PRESETS.find(k=>k.code===code);
      if(f && f.name===code) f.name = name;
      acBox.style.display = "none";
      acBox.innerHTML = "";
      const ci = document.getElementById("codeInput");
      ci.value = "";
      ci.blur();   // 자동완성 재발생 방지
      setCode(code);
    };
    el.addEventListener("mousedown", pick);
    el.addEventListener("touchstart", pick, {passive:false});
  });
}
tickerInput.addEventListener("input", ()=>{
  const q = tickerInput.value.trim();
  clearTimeout(acTimer);
  if(q.length < 1 || /^\d{1,6}$/.test(q)){ acBox.style.display="none"; return; }
  // 한글이면 사전에서 즉시 (야후 호출 없이 — 깜빡임 없음)
  if(/[가-힣]/.test(q)){
    const hits = searchDict(q);
    if(hits.length){ showAc(hits); return; }
  }
  // 영문/그 외는 야후 검색
  acTimer = setTimeout(async ()=>{
    if(tickerInput.value.trim() !== q) return;
    const list = await searchKR(q);
    if(tickerInput.value.trim() !== q) return;
    showAc(list);
  }, 350);
});
document.addEventListener("click", e=>{
  if(!e.target.closest(".row") && !e.target.closest("#acBox")) acBox.style.display = "none";
});

/* ── 한국 시장 날씨 (코스피·코스닥·환율 종합) ── */
async function yahooQuote(ysym){
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${ysym}?range=2d&interval=1d`;
  const tries = [
    base,
    `https://corsproxy.io/?url=${encodeURIComponent(base)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(base)}`
  ];
  for(const u of tries){
    try{
      const res = await fetch(u, {signal:AbortSignal.timeout(11000)});
      if(!res.ok) continue;
      const j = await res.json();
      const m = j?.chart?.result?.[0]?.meta;
      if(m && isFinite(m.regularMarketPrice)){
        const now = m.regularMarketPrice, prev = m.chartPreviousClose ?? now;
        return { v: now, pc: prev ? ((now/prev)-1)*100 : 0 };
      }
    }catch(e){}
  }
  return null;
}

async function loadKRWeather(){
  const grid = document.getElementById("krwGrid");
  // 코스피·코스닥·환율
  const [kospi, kosdaq, usdkrw] = await Promise.all([
    yahooQuote("%5EKS11"),   // 코스피
    yahooQuote("%5EKQ11"),   // 코스닥
    yahooQuote("KRW=X")      // 원/달러
  ]);

  // 카드 렌더
  const card = (name, q, digits, unit)=>{
    if(!q) return `<div class="krw-card"><div class="krw-name">${name}</div><div class="krw-val" style="color:var(--dim)">—</div></div>`;
    const c = q.pc>=0 ? "var(--buy)" : "var(--sell)";
    return `<div class="krw-card"><div class="krw-name">${name}</div>
      <div class="krw-val">${unit}${q.v.toLocaleString(undefined,{maximumFractionDigits:digits})}
      <span class="krw-chg" style="color:${c}">${q.pc>=0?"+":""}${q.pc.toFixed(2)}%</span></div></div>`;
  };
  grid.innerHTML = card("코스피", kospi, 2, "") + card("코스닥", kosdaq, 2, "")
    + card("원/달러", usdkrw, 1, "₩");

  // 종합 점수 (코스피·코스닥 등락 위주, 환율 약세는 감점)
  let score = 50, parts = [];
  if(kospi){ score += kospi.pc * 8; parts.push(`코스피 ${kospi.pc>=0?"+":""}${kospi.pc.toFixed(1)}%`); }
  if(kosdaq){ score += kosdaq.pc * 4; }
  if(usdkrw){ score -= Math.max(0, usdkrw.pc) * 5; }  // 원화 약세(환율↑)면 감점
  score = Math.max(0, Math.min(100, score));

  const sky = document.getElementById("whSky");
  const icon = document.getElementById("whIcon");
  const label = document.getElementById("whLabel");
  const sub = document.getElementById("whSub");
  let cls, ic, lb, sb;
  if(score >= 72){ cls="sky-sunny"; ic="☀️"; lb="맑음 — 시장 강세"; sb="상승 흐름, 투자심리 양호"; }
  else if(score >= 56){ cls="sky-partly"; ic="⛅"; lb="구름 조금 — 대체로 양호"; sb="완만한 흐름"; }
  else if(score >= 44){ cls="sky-cloudy"; ic="☁️"; lb="흐림 — 혼조"; sb="방향 모호, 관망세"; }
  else if(score >= 28){ cls="sky-rain"; ic="🌧️"; lb="비 — 약세 분위기"; sb="하락 압력, 보수적 접근"; }
  else { cls="sky-storm"; ic="⛈️"; lb="폭풍 — 급락 경계"; sb="변동성 확대, 주의 필요"; }
  sky.className = "wh-sky " + cls;
  icon.textContent = ic;
  label.textContent = lb;
  sub.textContent = (parts.length ? parts.join(" · ") + " · " : "") + sb;
  const ws = document.getElementById("weatherSummary");
  if(ws) ws.textContent = ic + " " + lb.split(" — ")[0];

  document.querySelectorAll(".wh-drop").forEach(d=>d.remove());
  if(cls==="sky-rain" || cls==="sky-storm"){
    const hero = document.getElementById("weatherHero");
    const n = cls==="sky-storm" ? 18 : 11;
    for(let i=0;i<n;i++){
      const d = document.createElement("div");
      d.className = "wh-drop";
      d.style.left = Math.random()*100 + "%";
      d.style.animationDuration = (0.5 + Math.random()*0.6) + "s";
      d.style.animationDelay = (Math.random()*1.5) + "s";
      hero.appendChild(d);
    }
  }
}
